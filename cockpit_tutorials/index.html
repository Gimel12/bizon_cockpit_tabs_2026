<!DOCTYPE html>
<html>
<head>
    <title>Video Tutorials</title>
    <meta charset="utf-8">
    <script src="../base1/cockpit.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg: #0d1117; --bg-card: #161b22; --border: #30363d;
            --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }

        .app { display: flex; flex-direction: column; height: 100vh; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-card);
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header a {
            padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
            background: var(--accent); color: #fff; text-decoration: none; border: none; cursor: pointer;
        }
        .header a:hover { opacity: 0.85; }

        .frame-wrap { flex: 1; overflow: hidden; }
        .frame-wrap iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><span>🎬</span> Video Tutorials</h1>
        <a href="https://bizonbizon.notion.site/Video-Tutorials-3430d419e59280488bd3f76098997bd7" target="_blank">↗ Open in Notion</a>
    </div>
    <div class="frame-wrap">
        <iframe src="https://bizonbizon.notion.site/Video-Tutorials-3430d419e59280488bd3f76098997bd7"></iframe>
    </div>
</div>
</body>
</html>
