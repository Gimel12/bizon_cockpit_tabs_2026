<!DOCTYPE html>
<html>
<head>
    <title>My Notebooks</title>
    <meta charset="utf-8">
    <script src="../base1/cockpit.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="js/jquery.js"></script>
    <style>
        :root {
            --bg: #0d1117; --bg-card: #161b22; --bg-input: #21262d;
            --border: #30363d; --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #58a6ff; --accent2: #1f6feb; --green: #3fb950; --red: #f85149; --orange: #db6d28;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-y: auto; }

        .page { max-width: 1100px; margin: 0 auto; padding: 24px; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .header h1 { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 8px; }
        .btn {
            padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border); transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { background: var(--bg-input); color: var(--text2); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
        .btn-run { background: var(--green); color: #fff; border-color: var(--green); font-size: 15px; padding: 12px 32px; }
        .btn-run:hover { opacity: 0.85; }

        /* Step sections */
        .step { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .step-num { background: var(--accent2); color: #fff; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
        .step-title { font-size: 15px; font-weight: 600; }

        /* Container grid */
        #containers-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;
        }
        #containers-grid .custom-container {
            background: var(--bg-input); border: 2px solid var(--border); border-radius: 10px;
            padding: 12px; cursor: pointer; transition: all 0.2s; text-align: center; overflow: hidden;
        }
        #containers-grid .custom-container:hover { border-color: var(--accent); }
        #containers-grid .custom-container.seleted-card { border-color: var(--green); background: rgba(63,185,80,0.08); }
        #containers-grid .custom-container img { width: 100%; height: 60px; object-fit: contain; border-radius: 6px; margin-bottom: 8px; }
        #containers-grid .custom-container p { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0; }

        /* Hidden list view — keeps element for JS */
        #containers-list { display: none; }

        /* View toggle (hidden but structurally present for switcher) */
        .view-toggle { display: none; }

        /* Machine grid */
        #machine-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        #machine-grid .custom-machine {
            background: var(--bg-input); border: 2px solid var(--border); border-radius: 10px;
            padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
            font-size: 14px; font-weight: 600;
        }
        #machine-grid .custom-machine:hover { border-color: var(--accent); }
        #machine-grid .custom-machine.seleted-machine { border-color: var(--green); background: rgba(63,185,80,0.08); }

        /* Form fields */
        .form-group { margin-bottom: 14px; }
        .form-group label, .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input[type="text"], .uk-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); padding: 10px 14px; font-size: 13px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .uk-input:focus { border-color: var(--accent); }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .checkbox-row input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
        .checkbox-row label { font-size: 13px; color: var(--text); cursor: pointer; }
        .volume-bind { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }

        /* Run button area */
        .run-area { text-align: center; margin-top: 8px; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 440px; max-width: 90vw; overflow: hidden; }
        .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 700; }
        .modal-body { padding: 20px 24px; font-size: 14px; color: var(--text2); line-height: 1.6; }
        .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-spinner { display: flex; align-items: center; gap: 10px; visibility: hidden; }
        .modal-spinner .spin { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        .modal-spinner label { font-size: 12px; color: var(--text2); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-btns { display: flex; gap: 8px; }

        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--green); border-radius: 8px; padding: 12px 20px; font-size: 13px; color: var(--green); z-index: 99999; opacity: 0; transform: translateY(-10px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <h1><span>📓</span> My Notebooks</h1>
        <div class="header-actions">
            <a class="btn btn-primary" href="active_containers.html">📋 Active Notebooks</a>
        </div>
    </div>

    <!-- Step 1: Choose Container -->
    <div class="step">
        <div class="step-header">
            <span class="step-num">1</span>
            <span class="step-title">Choose Container Image</span>
        </div>
        <div id="containers-grid"></div>
        <div id="containers-list" style="display:none;"></div>
    </div>

    <!-- Step 2: Choose Machine -->
    <div class="step">
        <div class="step-header">
            <span class="step-num">2</span>
            <span class="step-title">Choose GPU Count</span>
        </div>
        <div id="machine-grid"></div>
    </div>

    <!-- Step 3: Notebook Options -->
    <div class="step">
        <div class="step-header">
            <span class="step-num">3</span>
            <span class="step-title">Notebook Options</span>
        </div>
        <div class="form-group">
            <div class="checkbox-row">
                <input type="checkbox" id="volume-bind-check">
                <label for="volume-bind-check">Bind Volume</label>
            </div>
            <div class="hidden volume-bind">
                <div class="form-group">
                    <label>Host Location</label>
                    <input type="text" id="vol-host" placeholder="Enter the host location...">
                </div>
                <div class="form-group">
                    <label>Container Location</label>
                    <input type="text" id="vol-container" placeholder="Enter the container location...">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Notebook Name</label>
            <input type="text" id="name-notebook" placeholder="Enter the Notebook Name...">
        </div>
        <div class="form-group">
            <label>Extra Options</label>
            <input type="text" id="extra-option" placeholder="Type the extra command options...">
        </div>
    </div>

    <div class="run-area">
        <a class="btn btn-run" id="run_button">▶ Launch Notebook</a>
    </div>
</div>

<!-- Update Tab Modal -->
<div class="modal-overlay" id="modal-update">
    <div class="modal-box">
        <div class="modal-header">🔄 Updating Cockpit Tab</div>
        <div class="modal-body"><p id="update-text"></p></div>
        <div class="modal-footer">
            <div class="modal-spinner" id="updating-spinner"><div class="spin"></div><label>Installing the update...</label></div>
            <div class="modal-btns">
                <button class="btn btn-secondary" id="cancel-update-tab-btn">Cancel</button>
                <button class="btn btn-primary" id="update-tab-btn">Update</button>
            </div>
        </div>
    </div>
</div>
<div class="modal-overlay" id="modal-update-webui">
    <div class="modal-box">
        <div class="modal-header">⬆️ Updating All Web-UI</div>
        <div class="modal-body"><p id="update-webui-text"></p></div>
        <div class="modal-footer">
            <div class="modal-spinner" id="updating-webui-spinner"><div class="spin"></div><label>Installing the update...</label></div>
            <div class="modal-btns">
                <button class="btn btn-secondary" id="cancel-update-webui-btn">Cancel</button>
                <button class="btn btn-primary" id="update-webui-btn">Update</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
var UIkit = {
    modal: function(el) { return { show: function() { el.classList.add('show'); }, hide: function() { el.classList.remove('show'); } }; },
    notification: function(opts) { var t = document.getElementById('toast'); t.textContent = opts.message; t.className = 'toast show' + (opts.status === 'danger' ? ' error' : ''); setTimeout(function() { t.className = 'toast'; }, opts.timeout || 3000); }
};
document.querySelectorAll('.modal-overlay').forEach(function(o) { o.addEventListener('click', function(e) { if (e.target === o) o.classList.remove('show'); }); });
</script>
<script src="assets/js/custom.js"></script>
<script src="assets/js/upd_platform.js"></script>
</body>
</html>
