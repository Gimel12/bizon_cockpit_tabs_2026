<!DOCTYPE html>
<html lang="en">
<head>
    <title>Active Notebooks</title>
    <meta charset="utf-8">
    <script src="../base1/cockpit.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="js/jquery.js"></script>
    <style>
        :root {
            --bg: #0d1117; --bg-card: #161b22; --bg-input: #21262d;
            --border: #30363d; --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #db6d28;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-y: auto; }

        .page { max-width: 1100px; margin: 0 auto; padding: 24px; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .header h1 { font-size: 22px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 8px; }

        .btn {
            padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border); transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary { background: var(--bg-input); color: var(--text2); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
        .btn-danger { background: none; color: var(--red); border-color: var(--red); }
        .btn-danger:hover { background: rgba(248,81,73,0.1); }
        .btn-warn { background: var(--orange); color: #fff; border-color: var(--orange); }
        .btn-warn:hover { opacity: 0.85; }

        /* Table */
        .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: var(--bg-input); padding: 12px 16px; font-size: 11px; font-weight: 700;
            color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; text-align: left;
            border-bottom: 1px solid var(--border);
        }
        tbody td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(88,166,255,0.04); }
        .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }

        /* Action buttons in table — override generated classes */
        .run-button {
            padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
            background: var(--accent); color: #fff; border: none; text-decoration: none; display: inline-block;
        }
        .run-button:hover { opacity: 0.85; }
        .stop-button {
            padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
            background: none; color: var(--red); border: 1px solid var(--red);
        }
        .stop-button:hover { background: rgba(248,81,73,0.1); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; width: 440px; max-width: 90vw; overflow: hidden; }
        .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 700; }
        .modal-body { padding: 20px 24px; font-size: 14px; color: var(--text2); line-height: 1.6; }
        .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        .modal-body input[type="text"] {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); padding: 10px 14px; font-size: 13px; outline: none; margin-top: 10px;
        }
        .modal-body input:focus { border-color: var(--accent); }
        .modal-body .uk-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); padding: 10px 14px; font-size: 13px; outline: none; margin-top: 10px;
        }

        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--green); border-radius: 8px; padding: 12px 20px; font-size: 13px; color: var(--green); z-index: 99999; opacity: 0; transform: translateY(-10px); transition: all 0.3s; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <h1><span>📋</span> Active Notebooks</h1>
        <div class="header-actions">
            <a class="btn btn-danger" id="stop-all" hidden>⏹ Stop All</a>
            <a class="btn btn-primary" href="index.html">+ Create New Notebook</a>
        </div>
    </div>

    <div class="table-wrap">
        <table id="run-container">
            <!-- Populated by active_container.js -->
        </table>
    </div>
</div>

<!-- Commit Modal -->
<div class="modal-overlay" id="commit-modal">
    <div class="modal-box">
        <div class="modal-header">💾 Save Container as Image</div>
        <div class="modal-body">
            <p id="header-commit-text"></p>
            <input class="uk-input" type="text" id="commit-name" placeholder="Enter the name for the new image...">
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="commit-cancel-btn">Cancel</button>
            <button class="btn btn-primary" id="commit-container-btn">💾 Save</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
var UIkit = {
    modal: function(el) {
        return {
            show: function() { el.classList.add('show'); },
            hide: function() { el.classList.remove('show'); }
        };
    },
    notification: function(opts) {
        var t = document.getElementById('toast');
        t.textContent = opts.message;
        t.className = 'toast show' + (opts.status === 'danger' ? ' error' : '');
        setTimeout(function() { t.className = 'toast'; }, opts.timeout || 3000);
    }
};
document.querySelectorAll('.modal-overlay').forEach(function(o) {
    o.addEventListener('click', function(e) { if (e.target === o) o.classList.remove('show'); });
});
document.getElementById('commit-cancel-btn').addEventListener('click', function() {
    document.getElementById('commit-modal').classList.remove('show');
});
</script>
<script src="assets/js/active_container.js"></script>
</body>
</html>
